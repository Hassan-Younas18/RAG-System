<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBot — Medical Document Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eaf0f2;
    --panel:#ffffff;
    --ink:#15323a;
    --muted:#5d7780;
    --line:#d6e0e3;
    --teal:#117a8b;
    --teal-deep:#0c5965;
    --teal-tint:#e7f1f3;
    --coral:#ec6a52;
    --shadow:0 10px 30px rgba(18,60,70,.10);
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #f3f8f9 0%, transparent 60%),
      var(--paper);
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:860px;
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding:18px 18px 22px;
  }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    gap:14px;
    padding:6px 4px 16px;
  }
  .mark{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(150deg,var(--teal) 0%,var(--teal-deep) 100%);
    display:grid;place-items:center;
    box-shadow:var(--shadow);
    flex:0 0 auto;
  }
  .mark svg{width:24px;height:24px}
  .title h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;font-size:20px;letter-spacing:-.01em;margin:0;
  }
  .title p{margin:1px 0 0;font-size:12.5px;color:var(--muted)}

  .chip{
    margin-left:auto;
    display:flex;align-items:center;gap:8px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:999px;
    padding:7px 13px;
    font-size:12.5px;color:var(--muted);
    max-width:46%;
  }
  .chip .doc{
    color:var(--ink);font-weight:500;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:#c2ced2;flex:0 0 auto}
  .chip.ready .dot{
    background:var(--teal);
    box-shadow:0 0 0 0 rgba(17,122,139,.5);
    animation:pulse 2.2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(17,122,139,.45)}
    70%{box-shadow:0 0 0 7px rgba(17,122,139,0)}
    100%{box-shadow:0 0 0 0 rgba(17,122,139,0)}
  }

  /* ---------- Conversation ---------- */
  .stream{
    flex:1 1 auto;
    overflow-y:auto;
    padding:8px 4px 10px;
    display:flex;flex-direction:column;gap:14px;
    scroll-behavior:smooth;
  }
  .stream::-webkit-scrollbar{width:9px}
  .stream::-webkit-scrollbar-thumb{background:#cdd9dc;border-radius:9px}

  .msg{display:flex;gap:11px;max-width:86%;animation:rise .28s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg .av{
    width:30px;height:30px;border-radius:9px;flex:0 0 auto;
    display:grid;place-items:center;font-size:13px;font-weight:600;
  }
  .msg.bot .av{background:var(--teal-tint);color:var(--teal-deep)}
  .bubble{
    padding:12px 15px;border-radius:14px;font-size:14.5px;line-height:1.55;
  }
  .msg.bot .bubble{
    background:var(--panel);border:1px solid var(--line);
    border-top-left-radius:5px;color:var(--ink);
  }
  .msg.user{align-self:flex-end;flex-direction:row-reverse}
  .msg.user .bubble{
    background:linear-gradient(150deg,var(--teal) 0%,var(--teal-deep) 100%);
    color:#fff;border-top-right-radius:5px;
  }
  .msg.user .av{background:var(--ink);color:#fff}
  .bubble.warn{border-color:#f3d2cb;background:#fdf1ee;color:#a23d29}

  /* ---------- Empty state / upload ---------- */
  .empty{
    margin:auto;width:100%;max-width:460px;text-align:center;padding:20px;
  }
  .drop{
    border:1.5px dashed #b9cace;border-radius:var(--radius);
    background:var(--panel);
    padding:34px 24px;cursor:pointer;transition:.18s;
    box-shadow:var(--shadow);
  }
  .drop:hover,.drop.hot{border-color:var(--teal);background:#f6fbfb;transform:translateY(-1px)}
  .drop .ic{width:46px;height:46px;margin:0 auto 14px;color:var(--teal)}
  .drop h2{font-family:'Space Grotesk',sans-serif;font-size:17px;margin:0 0 6px}
  .drop p{margin:0;color:var(--muted);font-size:13px}
  .empty .hint{margin-top:14px;font-size:12px;color:var(--muted)}

  /* ---------- Composer ---------- */
  .composer{
    margin-top:12px;display:flex;align-items:flex-end;gap:9px;
    background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:8px 8px 8px 10px;box-shadow:var(--shadow);
  }
  .composer textarea{
    flex:1;border:0;resize:none;outline:none;background:transparent;
    font-family:inherit;font-size:14.5px;color:var(--ink);
    line-height:1.5;max-height:130px;padding:7px 4px;
  }
  .iconbtn{
    width:40px;height:40px;border-radius:11px;border:1px solid var(--line);
    background:#fff;color:var(--muted);cursor:pointer;flex:0 0 auto;
    display:grid;place-items:center;transition:.15s;
  }
  .iconbtn:hover{color:var(--teal);border-color:var(--teal)}
  .send{
    width:40px;height:40px;border-radius:11px;border:0;flex:0 0 auto;
    background:var(--coral);color:#fff;cursor:pointer;
    display:grid;place-items:center;transition:.15s;
  }
  .send:hover{filter:brightness(.96)}
  .send:disabled{background:#cdd9dc;cursor:not-allowed}
  .iconbtn svg,.send svg{width:19px;height:19px}

  /* typing dots */
  .typing{display:flex;gap:4px;padding:4px 2px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--teal);
    opacity:.4;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;
    font-size:13.5px;box-shadow:var(--shadow);opacity:0;pointer-events:none;
    transition:.25s;z-index:5;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

  @media (max-width:560px){
    .chip{max-width:40%}
    .msg{max-width:92%}
    .title p{display:none}
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/>
        <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
      </svg>
    </div>
    <div class="title">
      <h1>MedBot</h1>
      <p>Answers grounded in your medical document</p>
    </div>
    <div class="chip" id="chip">
      <span class="dot"></span>
      <span class="doc" id="docName">No document loaded</span>
    </div>
  </header>

  <div class="stream" id="stream">
    <!-- Empty state (shown until a PDF is indexed) -->
    <div class="empty" id="empty">
      <div class="drop" id="drop">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15l3-3 3 3"/>
        </svg>
        <h2>Upload a medical PDF to begin</h2>
        <p>Drag &amp; drop a file here, or click to browse</p>
      </div>
      <div class="hint">PDF only · processed locally on your machine</div>
    </div>
  </div>

  <div class="composer">
    <button class="iconbtn" id="attach" title="Upload a different PDF" aria-label="Upload a different PDF">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
      </svg>
    </button>
    <textarea id="input" rows="1" placeholder="Upload a PDF first…" disabled></textarea>
    <button class="send" id="send" disabled aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<input type="file" id="fileInput" accept="application/pdf,.pdf" hidden>
<div class="toast" id="toast"></div>

<script>
const stream   = document.getElementById('stream');
const empty    = document.getElementById('empty');
const drop     = document.getElementById('drop');
const fileInput= document.getElementById('fileInput');
const input    = document.getElementById('input');
const send     = document.getElementById('send');
const attach   = document.getElementById('attach');
const chip     = document.getElementById('chip');
const docName  = document.getElementById('docName');
const toast    = document.getElementById('toast');

let ready = false;

// ---------- helpers ----------
function showToast(text){
  toast.textContent = text; toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 3200);
}
function scrollDown(){ stream.scrollTop = stream.scrollHeight; }

function addMessage(text, who, isWarn=false){
  const msg = document.createElement('div');
  msg.className = 'msg ' + who;
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = who === 'user' ? 'You'.charAt(0) : 'M';
  const bubble = document.createElement('div');
  bubble.className = 'bubble' + (isWarn ? ' warn' : '');
  bubble.textContent = text;
  msg.appendChild(av); msg.appendChild(bubble);
  stream.appendChild(msg); scrollDown();
  return bubble;
}

function addTyping(){
  const msg = document.createElement('div');
  msg.className = 'msg bot'; msg.id = 'typing';
  msg.innerHTML = '<div class="av">M</div>'+
    '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  stream.appendChild(msg); scrollDown();
}
function removeTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

function setReady(state, name){
  ready = state;
  input.disabled = !state; send.disabled = !state;
  if(state){
    empty.style.display = 'none';
    chip.classList.add('ready');
    docName.textContent = name || 'Document loaded';
    input.placeholder = 'Ask a question about the document…';
  }else{
    chip.classList.remove('ready');
    docName.textContent = 'No document loaded';
    input.placeholder = 'Upload a PDF first…';
  }
}

// ---------- upload ----------
async function uploadFile(file){
  if(!file) return;
  if(file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')){
    showToast('Please choose a PDF file.'); return;
  }
  const bubble = addMessage('Processing "'+file.name+'"…', 'bot');
  const fd = new FormData(); fd.append('file', file);
  try{
    const res = await fetch('/upload', {method:'POST', body:fd});
    const data = await res.json();
    if(data.ok){
      setReady(true, data.source);
      bubble.textContent = data.message;
      input.focus();
    }else{
      bubble.classList.add('warn');
      bubble.textContent = data.error || 'Could not process that PDF.';
    }
  }catch(err){
    bubble.classList.add('warn');
    bubble.textContent = 'Upload failed. Is the server still running?';
  }
}

drop.addEventListener('click', ()=>fileInput.click());
attach.addEventListener('click', ()=>fileInput.click());
fileInput.addEventListener('change', e=>{
  if(e.target.files[0]) uploadFile(e.target.files[0]);
  fileInput.value = '';
});
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{
  e.preventDefault(); drop.classList.add('hot');
}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{
  e.preventDefault(); drop.classList.remove('hot');
}));
drop.addEventListener('drop', e=>{
  if(e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});

// ---------- chat ----------
async function sendMessage(){
  const text = input.value.trim();
  if(!text || !ready) return;
  addMessage(text, 'user');
  input.value=''; input.style.height='auto';
  send.disabled = true;
  addTyping();
  try{
    const res = await fetch('/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text})
    });
    const data = await res.json();
    removeTyping();
    const warn = data.answer && data.answer.startsWith('I could not find');
    addMessage(data.answer, 'bot', warn);
  }catch(err){
    removeTyping();
    addMessage('Something went wrong reaching the server.', 'bot', true);
  }finally{
    send.disabled = !ready;
    input.focus();
  }
}

send.addEventListener('click', sendMessage);
input.addEventListener('keydown', e=>{
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); }
});
input.addEventListener('input', ()=>{
  input.style.height='auto';
  input.style.height = Math.min(input.scrollHeight, 130)+'px';
});

// ---------- on load: ask server if a doc is already loaded ----------
fetch('/status').then(r=>r.json()).then(d=>{
  if(d.ready) setReady(true, d.source);
}).catch(()=>{});
</script>
</body>
</html>
